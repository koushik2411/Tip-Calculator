<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box">
        <h2>Tip Calculator</h2>

        <input type="number" id="bill" placeholder="Enter Bill Amount">

        <input type="number" id="tipPercentage" placeholder="Enter Tip %">

        <input type="number" id="peopleNum" placeholder="No. of people">

        <button id="btn">Calculate</button>
        
        <h4>Total Amount: ₹ <span id="totalAmount"></span>/-</h4>

        <p id="result"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
